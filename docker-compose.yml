services:
  mysql:
    image: mysql:8.0.36
    container_name: traffic_agent_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootsecret
      MYSQL_DATABASE: traffic_agent
      MYSQL_USER: app
      MYSQL_PASSWORD: secret
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uapp", "-psecret"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  mysql_data:
