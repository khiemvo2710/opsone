services:
  mysql:
    image: mysql:8.0.36
    container_name: opsone-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootsecret
      MYSQL_DATABASE: opsone
      MYSQL_USER: app
      MYSQL_PASSWORD: secret
      TZ: Asia/Ho_Chi_Minh
    command: --default-time-zone=+07:00
    ports:
      - "3306:3306"
    volumes:
      - opsone_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootsecret"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  opsone_mysql_data:
